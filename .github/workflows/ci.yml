name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --trust-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test --runInBand
      - run: pnpm build
      - run: pnpm test:e2e --runInBand
